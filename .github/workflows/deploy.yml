name: Build and push image to GHCR

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/labontese/patch-window

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,format=short
            type=raw,value={{date 'YYYYMMDD'}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        run: |
          echo "Starting container for smoke test..."
          docker run -d \
            --name patchwindow-smoke \
            -e NODE_ENV=production \
            -e DATABASE_URL="postgresql://fake:fake@localhost:5432/fake" \
            -e RESEND_API_KEY="re_fake" \
            -p 3000:3000 \
            ${{ env.IMAGE_NAME }}:latest

          echo "Waiting for Next.js to start on port 3000..."
          for i in $(seq 1 24); do
            if docker exec patchwindow-smoke wget -qO- http://localhost:3000/ > /dev/null 2>&1 || \
               nc -z localhost 3000 2>/dev/null; then
              echo "Container is responding on port 3000."
              docker stop patchwindow-smoke
              docker rm patchwindow-smoke
              exit 0
            fi
            echo "  Attempt $i/24: waiting..."
            sleep 5
          done

          echo "Timed out waiting for port 3000. Logs:"
          docker logs patchwindow-smoke
          docker stop patchwindow-smoke
          docker rm patchwindow-smoke
          exit 1

# =============================================================
# Secrets som behövs på patchwindow-repot:
#
#   GITHUB_TOKEN  — automatisk, GitHub sköter auth mot GHCR
#
# Secrets som INTE längre behövs (kan rensas):
#   DEPLOY_HOST   — användes av den gamla rsync-deployen
#   DEPLOY_SSH_KEY — användes av den gamla rsync-deployen
#
# Runtime-secrets hanteras som env-vars på servern (ej i image):
#   PATCHWINDOW_DATABASE_URL
#   PATCHWINDOW_RESEND_API_KEY
#
# Image-visibility:
#   Repot Labontese/patch-window är public, vilket gör GHCR-imagen
#   public by default efter första pushen. Ingen pull-auth behövs
#   på servern. Om du vill göra imagen private: gå till
#   ghcr.io > patch-window > Package settings > Change visibility.
#   Då behöver du sätta upp docker login på servern med en PAT som
#   har 'read:packages'-scope.
# =============================================================
